<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web Segura</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #resultado { margin-top: 20px; color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛡️ acde.duckdns.org</h1>
        <p>Prueba de Certificado TLS y API</p>
        <button onclick="probarAPI()">Probando Servidor</button>
        <div id="resultado">Esperando respuesta...</div>
    </div>

    <script>
        async function probarAPI() {
            try {
                // Hacemos una petición al endpoint que creamos en Node
                const respuesta = await fetch('/api/status');
                const datos = await respuesta.json();
                document.getElementById('resultado').innerText = datos.mensaje + " a las " + datos.timestamp;
            } catch (error) {
                document.getElementById('resultado').innerText = "Error en la conexión";
            }
        }
    </script>
</body>
</html>
